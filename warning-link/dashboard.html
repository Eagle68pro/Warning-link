<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Teacher Dashboard</title>

  <style>
    body{
      font-family:system-ui, Arial;
      margin:0;
      padding:24px;
      background:#f9fafb;
      color:#111827;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
    }

    h1{
      margin-bottom:6px;
    }

    .muted{
      color:#6b7280;
      margin-top:0;
    }

    button{
      padding:10px 14px;
      border:1px solid #d1d5db;
      background:#fff;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
      margin-bottom:16px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:#fff;
      border-radius:10px;
      overflow:hidden;
    }

    th, td{
      padding:12px;
      border-bottom:1px solid #e5e7eb;
      text-align:left;
      font-size:14px;
    }

    th{
      background:#f3f4f6;
    }

    tr:hover{
      background:#f9fafb;
    }

    .tag{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      background:#e5e7eb;
      font-size:12px;
    }
  </style>
</head>

<body>
<div class="wrap">

  <h1>Teacher Dashboard</h1>
  <p class="muted">Live student completion tracking</p>

  <button onclick="loadData()">Refresh</button>

  <table>
    <thead>
      <tr>
        <th>Student ID</th>
        <th>Status</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDqi8yaE77N86tFqAKPMdQ7vyAJAz77Lo",
  authDomain: "cyber-training-26b9b.firebaseapp.com",
  projectId: "cyber-training-26b9b",
  storageBucket: "cyber-training-26b9b.appspot.com",
  messagingSenderId: "449151070259",
  appId: "1:449151070259:web:23fa8c2e2ab45be5637346"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.loadData = async function(){

  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  const snapshot = await getDocs(collection(db, "completions"));

  snapshot.forEach(doc => {
    const d = doc.data();

    const row = document.createElement("tr");

    row.innerHTML = `
      <td><b>${d.studentId || "N/A"}</b></td>
      <td><span class="tag">${d.completed ? "Completed" : "Unknown"}</span></td>
      <td>${d.time ? new Date(d.time).toLocaleString() : ""}</td>
    `;

    table.appendChild(row);
  });
};

loadData();
</script>

</body>
</html>
