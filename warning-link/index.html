<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Suspicious Link Check</title>

  <style>
    :root{
      --text:#111827;
      --muted:#4b5563;
      --border:#d1d5db;
      --ok:#16a34a;
      --warn:#dc2626;
    }

    * { box-sizing:border-box; }

    body{
      margin:0;
      font-family:system-ui, Arial;
      background:#fff;
      color:var(--text);
      display:flex;
      justify-content:center;
      padding:24px;
    }

    .wrap{ width:100%; max-width:760px; }

    .card{
      border:1px solid var(--border);
      border-radius:12px;
      padding:24px;
    }

    .badge{
      font-size:13px;
      border:1px solid var(--border);
      padding:6px 10px;
      border-radius:999px;
      display:inline-block;
    }

    .row{
      display:grid;
      grid-template-columns:1fr;
      gap:16px;
      margin-top:16px;
    }

    @media(min-width:640px){
      .row{ grid-template-columns:1fr 1fr; }
    }

    .panel{
      border:1px solid var(--border);
      border-radius:10px;
      padding:16px;
    }

    .scan{
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:200px;
      margin-top:12px;
    }

    .step{
      display:flex;
      align-items:center;
      gap:10px;
      padding:8px;
      border:1px solid var(--border);
      border-radius:8px;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#9ca3af;
    }

    .step.ok .dot{ background:var(--ok); }
    .step.warn .dot{ background:var(--warn); }

    input{
      width:100%;
      padding:10px;
      margin-top:6px;
      border:1px solid var(--border);
      border-radius:8px;
    }

    button{
      margin-top:10px;
      padding:10px 14px;
      border:1px solid var(--border);
      background:#fff;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
    }

    .hidden{ display:none; }

    .muted{
      color:var(--muted);
      font-size:13px;
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="card">

    <span class="badge">Suspicious Link Check</span>
    <h2>Phishing Awareness Simulation</h2>
    <p class="muted">Educational tool only</p>

    <div class="row">

      <!-- LEFT -->
      <div class="panel">

        <label><b>Student ID</b></label>
        <input id="studentId" placeholder="e.g. Loh@001 (max 20 chars)" />

        <div class="scan" id="scan"></div>

        <button id="start">Run Safe Demo</button>
        <button id="reset" class="hidden">Run Again</button>

        <p class="muted">Results are saved for teacher review.</p>
      </div>

      <!-- RIGHT -->
      <div class="panel">
        <h3>Safety Tips</h3>
        <ul>
          <li>Check sender address carefully</li>
          <li>Never trust urgency messages</li>
          <li>Do not enter passwords from unknown links</li>
        </ul>
      </div>

    </div>
  </div>
</div>

<script>
const scanEl = document.getElementById("scan");
const startBtn = document.getElementById("start");
const resetBtn = document.getElementById("reset");

const steps = [
  "Inspecting link format…",
  "Checking reputation…",
  "Detecting urgency tactics…",
  "Simulating fake login page…",
  "Risk analysis complete."
];

function clearScan(){
  scanEl.innerHTML = "";
  resetBtn.classList.add("hidden");
  startBtn.disabled = false;
}

async function runScan(){
  clearScan();
  startBtn.disabled = true;

  for (let i=0; i<steps.length; i++){
    const div = document.createElement("div");
    div.className = "step";
    div.innerHTML = `<span class="dot"></span><span>${steps[i]}</span>`;
    scanEl.appendChild(div);

    await new Promise(r => setTimeout(r, 600));
    div.classList.add(i === steps.length-1 ? "warn" : "ok");
  }

  resetBtn.classList.remove("hidden");
  startBtn.disabled = false;

  // VALIDATION (20 chars max, any symbols allowed)
  const studentId = document.getElementById("studentId").value.trim();

  if (!studentId) {
    alert("Enter Student ID");
    return;
  }

  if (studentId.length > 20) {
    alert("Max 20 characters allowed");
    return;
  }

  // SAVE
  if (window.saveCompletion) {
    window.saveCompletion(studentId);
  }
}

startBtn.addEventListener("click", runScan);
resetBtn.addEventListener("click", clearScan);
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  authDomain: "cyber-training-26b9b.firebaseapp.com",
  projectId: "cyber-training-26b9b",
  storageBucket: "cyber-training-26b9b.appspot.com",
  messagingSenderId: "449151070259",
  appId: "1:449151070259:web:23fa8c2e2ab45be5637346"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// expose function to main script
window.saveCompletion = async function(studentId){
  if(!studentId) return;

  await addDoc(collection(db, "completions"), {
    studentId,
    completed: true,
    time: new Date().toISOString()
  });
};
</script>

</body>
</html>
